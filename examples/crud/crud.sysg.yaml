version: "2"
logs:
  sink: file
  max_bytes: 10485760
  max_files: 5
status:
  snapshot_mode: summary
  snapshot_interval_secs: 5

services:
  fastapi_server:
    command: "uv run uvicorn main:app --host 0.0.0.0 --port 8888"
    deployment:
      strategy: "rolling"
    restart_policy: "on-failure"
    max_restarts: 10
    backoff: "5s"
