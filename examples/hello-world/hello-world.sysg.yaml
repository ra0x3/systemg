version: "1"
logs:
  sink: file
  max_bytes: 10485760
  max_files: 3
status:
  snapshot_mode: summary
  snapshot_interval_secs: 5
services:
  sh__hello_world:
    command: "sh hello-world.sh"
    env:
      file: ".env"
      vars:
        FOO: "foo"
    restart_policy: "on-failure"
    max_restarts: 5
    backoff: "5s"
