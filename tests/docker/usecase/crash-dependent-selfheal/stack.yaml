version: "2"
projects:
  shop:
    name: Shop
    services:
      db:
        command: "sleep 3000"
        restart_policy: "always"
      cache:
        command: "sleep 3000"
        restart_policy: "always"
      web:
        command: "sleep 3000"
        restart_policy: "always"
        depends_on: ["db"]
      report:
        command: "sleep 3000"
        restart_policy: "always"
        depends_on: ["db", "cache"]
      audit:
        command: "sleep 3000"
        restart_policy: "always"
        depends_on: ["db"]
        skip: true
